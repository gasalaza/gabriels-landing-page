<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1017"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#2dd4a8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="48" y1="0" x2="48" y2="630"/>
    <line x1="96" y1="0" x2="96" y2="630"/><line x1="144" y1="0" x2="144" y2="630"/>
    <line x1="192" y1="0" x2="192" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="288" y1="0" x2="288" y2="630"/><line x1="336" y1="0" x2="336" y2="630"/>
    <line x1="384" y1="0" x2="384" y2="630"/><line x1="432" y1="0" x2="432" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="528" y1="0" x2="528" y2="630"/>
    <line x1="576" y1="0" x2="576" y2="630"/><line x1="624" y1="0" x2="624" y2="630"/>
    <line x1="672" y1="0" x2="672" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="768" y1="0" x2="768" y2="630"/><line x1="816" y1="0" x2="816" y2="630"/>
    <line x1="864" y1="0" x2="864" y2="630"/><line x1="912" y1="0" x2="912" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1008" y1="0" x2="1008" y2="630"/>
    <line x1="1056" y1="0" x2="1056" y2="630"/><line x1="1104" y1="0" x2="1104" y2="630"/>
    <line x1="1152" y1="0" x2="1152" y2="630"/><line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="48" x2="1200" y2="48"/><line x1="0" y1="96" x2="1200" y2="96"/>
    <line x1="0" y1="144" x2="1200" y2="144"/><line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="288" x2="1200" y2="288"/>
    <line x1="0" y1="336" x2="1200" y2="336"/><line x1="0" y1="384" x2="1200" y2="384"/>
    <line x1="0" y1="432" x2="1200" y2="432"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="528" x2="1200" y2="528"/><line x1="0" y1="576" x2="1200" y2="576"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- GS monogram badge -->
  <rect x="80" y="200" width="64" height="64" rx="12" fill="none" stroke="#34d399" stroke-width="2" opacity="0.7"/>
  <text x="94" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="28" font-weight="600" fill="#34d399">G</text>
  <text x="118" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="28" font-weight="600" fill="#f0f0f5">S</text>

  <!-- Name -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="600" fill="#f0f0f5" letter-spacing="-1.5">Gabriel Salazar</text>

  <!-- Role -->
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a0a0b0" letter-spacing="-0.3">Software Engineer</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" fill="#6b6b80" letter-spacing="0.5">Shipping clean, scalable systems for 10+ years.</text>

  <!-- Location chip -->
  <rect x="80" y="470" width="210" height="34" rx="17" fill="none" stroke="#3a3a4a" stroke-width="1"/>
  <circle cx="100" cy="487" r="4" fill="#34d399"/>
  <text x="114" y="493" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#a0a0b0">Costa Rica 🇨🇷</text>

  <!-- URL -->
  <text x="80" y="560" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" fill="#6b6b80">gasalaza.com</text>

  <!-- Decorative accent glow -->
  <circle cx="1050" cy="315" r="200" fill="#34d399" opacity="0.03"/>
  <circle cx="1050" cy="315" r="120" fill="#34d399" opacity="0.04"/>
</svg>
